name: Auto Arsenal Scan
on:
  # Issue-driven: create issue → label "claude" → auto-execute task in issue body
  issues:
    types: [opened, labeled, assigned]

  # Interactive: @claude in issue/PR comments → respond
  issue_comment:
    types: [created]

  # Manual trigger with custom prompt
  workflow_dispatch:
    inputs:
      task:
        description: 'Task description for Claude'
        required: false
        default: |
          【系统纪律】禁止询问"是否继续"，禁止输出"请确认"，所有任务直接执行到完成。
          遇到不确定时默认继续，不停下来请求许可。只有全部任务完成后才停止。

          读取 MEMORY.md 恢复状态。进入 Phase 2 发散搜索：
          用 GitHub 搜索发现新的高星 Claude Code 仓库，
          扫描、审判、锻造，直到 max_turns 用尽。
          发现红色警报就锻造 Skill，注册 ARMORY.md + README.md。
          完成后更新 MEMORY.md。
      max_turns:
        description: 'Max agent turns'
        required: false
        default: '100'

env:
  ANTHROPIC_BASE_URL: https://api.minimaxi.com/anthropic
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.MINIMAX_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.task || '' }}
          track_progress: ${{ github.event_name != 'workflow_dispatch' }}
          claude_args: |
            --model MiniMax-M2.5-highspeed
            --max-turns ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_turns || '100' }}

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-${{ github.run_id }}
          path: ${{ steps.claude.outputs.execution_file }}
          retention-days: 7
